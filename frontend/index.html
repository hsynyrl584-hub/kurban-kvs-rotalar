<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kurban KVS - Rota Optimizasyonu</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
    }

    .container {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: white;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 20px;
      background: #1a73e8;
      color: white;
      flex-shrink: 0;
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .sidebar-header p {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 2px;
    }

    .sidebar-body {
      overflow-y: auto;
      flex: 1;
      padding: 16px;
    }

    .section {
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #e8eaed;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #444;
      margin-bottom: 4px;
      font-weight: 500;
    }

    input[type='file'] {
      width: 100%;
      padding: 8px;
      border: 1px dashed #ccc;
      border-radius: 6px;
      font-size: 13px;
      background: #fafafa;
      cursor: pointer;
    }

    input[type='number'] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
    }

    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      resize: vertical;
      min-height: 90px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #1a73e8;
      color: white;
    }

    .btn-primary:hover { background: #1558b0; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

    .btn-secondary {
      background: #f1f3f4;
      color: #444;
      margin-top: 6px;
    }

    .btn-secondary:hover { background: #e0e0e0; }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .status.loading { background: #e8f0fe; color: #1a73e8; }
    .status.success { background: #e6f4ea; color: #137333; }
    .status.error   { background: #fce8e6; color: #c5221f; }
    .status.info    { background: #f1f3f4; color: #444; }

    .spinner {
      display: inline-block;
      width: 11px;
      height: 11px;
      border: 2px solid #ccc;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .customer-preview {
      font-size: 12px;
      color: #5f6368;
      margin-top: 6px;
      padding: 6px 10px;
      background: #f8f9fa;
      border-radius: 4px;
    }

    /* Rota sonuçları */
    .route-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .route-card-header {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .route-card-header:hover { background: #f8f9fa; }

    .route-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .route-badge {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .route-name {
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }

    .route-meta {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    .route-toggle {
      font-size: 18px;
      color: #aaa;
      transition: transform 0.2s;
    }

    .route-toggle.open { transform: rotate(180deg); }

    .route-stops {
      display: none;
      border-top: 1px solid #e8eaed;
      max-height: 320px;
      overflow-y: auto;
    }

    .route-stops.open { display: block; }

    .stop-item {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .stop-item:last-child { border-bottom: none; }

    .stop-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }

    .stop-order {
      width: 20px;
      height: 20px;
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .stop-address {
      font-size: 12px;
      color: #333;
      line-height: 1.4;
    }

    .customer-row {
      display: flex;
      align-items: center;
      padding: 4px 8px;
      margin: 2px 0;
      background: #f8f9fa;
      border-radius: 4px;
      gap: 8px;
      font-size: 11px;
    }

    .customer-name {
      font-weight: 600;
      color: #333;
      min-width: 120px;
    }

    .customer-phones {
      color: #5f6368;
    }

    .map-container {
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-legend {
      position: absolute;
      bottom: 30px;
      right: 10px;
      background: white;
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-size: 12px;
      z-index: 1000;
      display: none;
    }

    .map-legend.show { display: block; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .route-maps-bar {
      padding: 6px 12px 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    .btn-maps {
      display: inline-block;
      padding: 5px 10px;
      background: #34a853;
      color: white;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .btn-maps:hover { background: #2d8f47; }

    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; grid-template-rows: auto 400px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>Kurban Rota Planlayıcı</h1>
        <p>Adres gruplamak ve rota optimizasyonu</p>
      </div>

      <div class="sidebar-body">

        <!-- CSV Yükle -->
        <div class="section">
          <div class="section-title">Veri Yükle</div>
          <div class="form-group">
            <label>Dosya <small style="color:#888">(Excel veya CSV — isim, tel1, tel2, adres)</small></label>
            <input type="file" id="csvFile" accept=".csv,.xlsx,.xls" />
            <div class="customer-preview" id="csvPreview" style="display:none"></div>
          </div>
        </div>

        <!-- Ayarlar -->
        <div class="section">
          <div class="section-title">Ayarlar</div>
          <div class="form-group">
            <label>Anadolu Yakası — Araç Başına Max Adres</label>
            <input type="number" id="anadoluGroupSize" value="25" min="5" max="50" />
          </div>
          <div class="form-group">
            <label>Avrupa Yakası — Araç Başına Max Adres</label>
            <input type="number" id="avrupaGroupSize" value="20" min="5" max="50" />
          </div>
        </div>

        <!-- Durum -->
        <div id="status" class="status info">Dosya yükleyerek başlayın</div>

        <!-- Buton -->
        <button class="btn btn-primary" id="optimizeBtn" disabled>
          Rotaları Optimize Et
        </button>
        <button class="btn btn-secondary" id="exportBtn" style="display:none" onclick="exportToExcel()">
          Excel İndir
        </button>

        <!-- Sonuçlar -->
        <div class="section" id="resultsSection" style="display:none; margin-top:16px">
          <div class="section-title" id="resultsTitle">Rotalar</div>
          <div id="results"></div>
        </div>

      </div>
    </div>

    <div class="map-container">
      <div id="map"></div>
      <div class="map-legend" id="mapLegend">
        <div id="legendItems"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
